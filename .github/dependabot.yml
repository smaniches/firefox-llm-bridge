version: 2

updates:
  # npm dev dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      lint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "prettier"
          - "globals"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(deps)"
