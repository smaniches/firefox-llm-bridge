<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firefox LLM Bridge</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-brand">
        <div class="logo-mark">T</div>
        <div class="header-text">
          <h1>LLM BRIDGE</h1>
          <span class="header-sub" id="provider-label">Not configured</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="btn-clear" class="icon-btn" title="New conversation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <div id="status-bar" class="status-idle">
      <div class="status-dot"></div>
      <span id="status-text">Ready</span>
      <span id="turn-counter" class="hidden"></span>
    </div>

    <!-- No provider configured -->
    <div id="no-provider-warning" class="hidden">
      <div class="warning-card">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        <p><strong>No AI provider configured.</strong></p>
        <p>Choose one to get started:</p>
        <div class="setup-options">
          <div class="setup-opt">
            <strong>Free:</strong> Install <a href="https://ollama.com" target="_blank">Ollama</a> for local AI.
          </div>
          <div class="setup-opt">
            <strong>Cloud:</strong> Bring your own API key for Claude, GPT-4o, or Gemini.
          </div>
        </div>
        <button id="btn-open-settings" class="btn-primary-sm">Open Settings</button>
      </div>
    </div>

    <div id="messages">
      <div class="welcome-msg">
        <p>Tell me what to do on this page, or ask a question about what you see.</p>
        <div class="quick-actions">
          <button class="quick-btn" data-action="Summarize this page">Summarize page</button>
          <button class="quick-btn" data-action="What are the main links on this page?">List links</button>
          <button class="quick-btn" data-action="Extract all text from this page">Extract text</button>
        </div>
      </div>
    </div>

    <div id="stop-bar" class="hidden">
      <button id="btn-stop" class="btn-stop">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop Agent
      </button>
    </div>

    <div id="input-area">
      <div class="mode-toggle">
        <button id="mode-chat" class="mode-btn active">Chat</button>
        <button id="mode-agent" class="mode-btn">Agent</button>
      </div>
      <div class="input-row">
        <textarea id="input-text" placeholder="Ask or instruct..." rows="1"></textarea>
        <button id="btn-send" class="btn-send" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="sidebar.js"></script>
</body>
</html>
